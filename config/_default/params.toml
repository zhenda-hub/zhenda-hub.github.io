# -- Theme Options --
colorScheme = "blowfish"
# autumn
# avocado
# bloody
# blowfish
# congo
# fire
# forest
# github
# marvel
# neon
# noir
# one-light
# princess
# slate
# terminal
defaultAppearance = "light"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true
keywords = ["blog", "developer", "personal"]

[header]
  layout = "fixed"
  # basic、fixed、fixed-fill、and fixed-fill-blur

[homepage]
  layout = "page"
  # profile
  # page
  # hero
  # background
  # card

  showRecent = true
  showRecentItems = 9
  cardView = true
  showMoreLink = true

[article]
  showDate = true
  showAuthor = true
  showReadingTime = true
  showWordCount = true
  showHeadingAnchors = true
  showTaxonomies = true
  showTableOfContents = true
  showBreadcrumbs = true
  showComments = true
  showViews = true
  showLikes = true
  showPagination = false
  showZenMode = true
  # seriesOpened = false
  showHero = true
  heroStyle = "big"
  # basic、big、background、thumbAndBackground
  # showEdit = true
[list]
  groupByYear = true
  cardView = true
  showSummary = true
  showViews = true
  showLikes = true

# Firebase configuration for views and likes
# Get your config from: https://console.firebase.google.com/
# Project settings → General → Your apps → Web app
[firebase]
  apiKey = "YOUR_API_KEY"
  authDomain = "YOUR_PROJECT_ID.firebaseapp.com"
  projectId = "YOUR_PROJECT_ID"
  storageBucket = "YOUR_PROJECT_ID.appspot.com"
  messagingSenderId = "YOUR_SENDER_ID"
  appId = "YOUR_APP_ID"
  # measurementId = "YOUR_MEASUREMENT_ID"  # Optional
