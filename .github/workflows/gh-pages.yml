name: Deploy to gh-pages

on:
  push:
    branches:
      - migrate/blowfish  # 从这个分支部署
  workflow_dispatch:      # 允许手动触发

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # 从 GitHub Secrets 生成配置文件
      - name: Setup production config
        run: |
          mkdir -p config/production
          cat > config/production/params.toml << 'EOF'
          # Production configuration
          # Auto-generated from GitHub Secrets

          [firebase]
            apiKey = "${{ secrets.FIREBASE_API_KEY }}"
            authDomain = "${{ secrets.FIREBASE_AUTH_DOMAIN }}"
            projectId = "${{ secrets.FIREBASE_PROJECT_ID }}"
            storageBucket = "${{ secrets.FIREBASE_STORAGE_BUCKET }}"
            messagingSenderId = "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"
            appId = "${{ secrets.FIREBASE_APP_ID }}"
            measurementId = "${{ secrets.FIREBASE_MEASUREMENT_ID }}"

          [umamiAnalytics]
            websiteid = "${{ secrets.UMAMI_WEBSITE_ID }}"
            domain = "${{ secrets.UMAMI_DOMAIN }}"
            enableTrackEvent = true
          EOF

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build
        run: hugo --minify --environment production

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
